name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        env:
          GATSBY_RESUME_URL: ${{ secrets.GATSBY_RESUME_URL }}
          GATSBY_PORTFOLIO_URL: ${{ secrets.GATSBY_PORTFOLIO_URL }}
        run: |
          git config --global user.name 'thumbzzero'
          git config --global user.email '${{ secrets.EMAIL }}'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/thumbzzero/thumbzzero.github.io.git
          npm run deploy
